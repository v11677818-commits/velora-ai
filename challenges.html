<!DOCTYPE html>
<html>

"University",
"Casual",
"Winter",
"Summer",
"Beach",
"Graduation",

"Classic",
"Luxury",
"Sport",
"Instagram",
"Celebrity",
"Work",
"Simple",
"Bold"
];

let html = "";
challenges.forEach(c => {
  html += "<p>" + c + "</p>";
});

document.getElementById("list").innerHTML = html;
</script>

</body>
</html>
