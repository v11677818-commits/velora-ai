<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Velora</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
    }

    .topbar {
      padding: 15px;
      background: #111;
      display: flex;
      align-items: center;
    }

    .menu {
      font-size: 20px;
      cursor: pointer;
    }

    .chat {
      height: 80vh;
      overflow-y: auto;
      padding: 15px;
    }

    .input-box {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
    }

    input {
      flex: 1;
      padding: 15px;
      border: none;
    }

    button {
      padding: 15px;
      background: #222;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="menu">☰</div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-box">
    <input id="msg" placeholder="Type a message">
    <button onclick="send()">Send</button>
  </div>

  <script>
    let role = localStorage.getItem("role") || "guest";
    let messages = 0;

    function send() {
      let input = document.getElementById("msg");
      let chat = document.getElementById("chat");

      if (!input.value) return;

      // guest restriction
      if (role === "guest" && messages >= 6) {
        alert("Limit reached");
        return;
      }

      chat.innerHTML += "<p>You: " + input.value + "</p>";
      chat.innerHTML += "<p>Bot: Response</p>";

      messages++;
      input.value = "";
    }
  </script>

</body>
</html>
