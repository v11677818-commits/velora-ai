<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Velora</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
}

/* top bar */
.topbar {
  padding: 15px;
  background: #111;
  display: flex;
  align-items: center;
}

.menu-btn {
  font-size: 20px;
  cursor: pointer;
}

/* sidebar */
.sidebar {
  position: fixed;
  left: -250px;
  top: 0;
  width: 250px;
  height: 100%;
  background: #111;
  transition: 0.3s;
  padding-top: 60px;
}

.sidebar a {
  display: block;
  padding: 15px;
  color: white;
  text-decoration: none;
}

.sidebar a:hover {
  background: #222;
}

.sidebar.open {
  left: 0;
}

/* chat */
.chat {
  height: 75vh;
  overflow-y: auto;
  padding: 15px;
}

/* input */
.input-box {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
}

input {
  flex: 1;
  padding: 15px;
  border: none;
}

button {
  padding: 15px;
  background: #222;
  color: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<!-- sidebar -->
<div class="sidebar" id="sidebar">
  <a href="home.html">Bot</a>
  <a href="group.html">Group</a>
  <a href="game.html">Game</a>
  <a href="outfits.html">Outfits</a>
  <a href="challenges.html">Challenges</a>
  <a href="store.html">Store</a>
  <a href="subscription.html">Subscription</a>
  <a href="profile.html">Profile</a>
</div>

<div class="chat" id="chat"></div>

<div class="input-box">
  <input id="msg" placeholder="Type a message">
  <button onclick="send()">Send</button>
</div>

<script>
let role = localStorage.getItem("role") || "guest";
let messages = 0;

function toggleMenu() {
  document.getElementById("sidebar").classList.toggle("open");
}

function send() {
  let input = document.getElementById("msg");
  let chat = document.getElementById("chat");

  if (!input.value) return;

  if (role === "guest" && messages >= 6) {
    alert("Limit reached");
    return;
  }

  chat.innerHTML += "<p>You: " + input.value + "</p>";
  chat.innerHTML += "<p>Bot: Response</p>";

  messages++;
  input.value = "";
}
</script>

</body>
</html>
